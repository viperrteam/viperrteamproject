<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}VipeRR Hub — Образовательные траектории{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #080c14;
      --bg2:         #0d1320;
      --bg3:         #111827;
      --border:      #1e2d45;
      --border2:     #243450;
      --accent:      #2563eb;
      --accent2:     #3b82f6;
      --accent-glow: rgba(37,99,235,0.25);
      --text:        #e8edf5;
      --text2:       #8fa3c0;
      --text3:       #4d6480;
      --success:     #10b981;
      --error:       #ef4444;
      --radius:      12px;
      --radius-sm:   8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Onest', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Сетка ── */
    .layout { display: flex; min-height: 100vh; }

    /* ── Сайдбар ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .sidebar-logo {
      padding: 28px 24px 24px;
      border-bottom: 1px solid var(--border);
    }
    .logo-mark {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .logo-text { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    .logo-sub  { font-size: 11px; color: var(--text3); font-weight: 400; margin-top: 1px; }

    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: var(--text2);
      font-size: 14px; font-weight: 500;
      transition: all .18s;
    }
    .nav-item:hover    { background: var(--bg3); color: var(--text); }
    .nav-item.active   { background: rgba(37,99,235,.15); color: var(--accent2); }
    .nav-item svg      { width: 18px; height: 18px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }
    .user-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: var(--bg3);
    }
    .user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .user-name  { font-size: 13px; font-weight: 600; color: var(--text); }
    .user-email { font-size: 11px; color: var(--text3); }
    .logout-btn {
      margin-top: 8px;
      width: 100%;
      padding: 8px 12px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text3);
      font-size: 13px; font-family: inherit; cursor: pointer;
      transition: all .18s;
      text-align: center; text-decoration: none; display: block;
    }
    .logout-btn:hover { border-color: var(--error); color: var(--error); }

    /* ── Основной контент ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg2);
    }
    .page-title   { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
    .page-sub     { font-size: 13px; color: var(--text2); margin-top: 2px; }

    .content { flex: 1; padding: 28px 32px; overflow-y: auto; }

    /* ── Флэши ── */
    .flash-list { list-style: none; margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
    .flash-item {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500;
      border-left: 3px solid;
    }
    .flash-item.success { background: rgba(16,185,129,.1); border-color: var(--success); color: #6ee7b7; }
    .flash-item.error   { background: rgba(239,68,68,.1);  border-color: var(--error);   color: #fca5a5; }

    /* ── Кнопки ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; text-decoration: none;
      transition: all .18s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .btn-primary:hover { background: var(--accent2); box-shadow: 0 0 30px rgba(59,130,246,.4); }
    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent2); }

    /* ── Поле ввода ── */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; font-weight: 600; color: var(--text2); }
    .input {
      padding: 11px 14px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit; font-size: 14px;
      transition: border-color .18s;
      outline: none;
    }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .input::placeholder { color: var(--text3); }

    /* ── Карточки курсов ── */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .course-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .course-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), #7c3aed);
      opacity: 0; transition: opacity .2s;
    }
    .course-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.4); }
    .course-card:hover::before { opacity: 1; }

    .course-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .course-desc  { font-size: 13px; color: var(--text2); line-height: 1.55; flex: 1;
                    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .tags-row     { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag-chip {
      padding: 3px 9px;
      background: rgba(37,99,235,.12);
      border: 1px solid rgba(37,99,235,.25);
      border-radius: 20px;
      font-size: 11px; font-weight: 500; color: var(--accent2);
      cursor: pointer; transition: all .15s; text-decoration: none;
    }
    .tag-chip:hover, .tag-chip.active { background: rgba(37,99,235,.3); border-color: var(--accent); }

    /* ── Пагинация ── */
    .pagination { display: flex; align-items: center; gap: 6px; justify-content: center; margin-top: 32px; }
    .page-link {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm);
      text-decoration: none; font-size: 14px; font-weight: 500;
      color: var(--text2);
      border: 1px solid var(--border);
      transition: all .15s;
    }
    .page-link:hover   { border-color: var(--accent); color: var(--accent2); }
    .page-link.current { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Поиск ── */
    .search-bar { display: flex; gap: 10px; margin-bottom: 24px; }
    .search-bar .input { flex: 1; }

    /* ── Фильтр тегов ── */
    .filter-section { margin-bottom: 20px; }
    .filter-label   { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }

    /* ── Профиль ── */
    .profile-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 24px;
    }
    .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .profile-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: #fff;
    }
    .profile-info-name  { font-size: 22px; font-weight: 700; }
    .profile-info-email { font-size: 14px; color: var(--text2); margin-top: 3px; }
    .stat-row   { display: flex; gap: 24px; }
    .stat-item  { display: flex; flex-direction: column; gap: 2px; }
    .stat-value { font-size: 22px; font-weight: 700; color: var(--accent2); font-variant-numeric: tabular-nums; }
    .stat-label { font-size: 12px; color: var(--text3); }

    /* ── Интересы ── */
    .interests-grid {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .interest-label {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: all .15s;
      font-size: 13px; font-weight: 500; color: var(--text2);
    }
    .interest-label:hover { border-color: var(--border2); color: var(--text); }
    .interest-label input { display: none; }
    .interest-label input:checked ~ span { color: var(--accent2); }
    .interest-label:has(input:checked) {
      background: rgba(37,99,235,.15);
      border-color: var(--accent);
      color: var(--accent2);
    }
    .check-icon { width: 14px; height: 14px; flex-shrink: 0; opacity: 0; transition: opacity .15s; }
    .interest-label:has(input:checked) .check-icon { opacity: 1; }

    /* ── Auth страницы ── */
    .auth-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 50% 0%, rgba(37,99,235,.15) 0%, transparent 60%);
    }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
    }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo-icon {
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 0 40px var(--accent-glow);
      margin-bottom: 16px;
    }
    .auth-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 6px; }
    .auth-sub   { font-size: 14px; color: var(--text2); text-align: center; margin-bottom: 28px; }
    .auth-form  { display: flex; flex-direction: column; gap: 16px; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text2); }
    .auth-footer a { color: var(--accent2); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    /* ── Divider ── */
    .section-divider {
      font-size: 12px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: .8px;
      margin-bottom: 16px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text3);
    }
    .empty-state svg { width: 48px; height: 48px; opacity: .3; margin-bottom: 12px; }
    .empty-state p   { font-size: 15px; }
  </style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
